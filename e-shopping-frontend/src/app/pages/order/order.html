<app-navbar></app-navbar>

<div class="order-container">

  <h2 class="title">📦 My Orders</h2>

  <div *ngIf="orders.length === 0" class="empty">
    No orders yet 😔
  </div>

  <!-- 🔁 ORDERS -->
  <div *ngFor="let order of orders" class="order-card">

    <!-- HEADER -->
    <div class="header">
      <h3>Order #{{order.id}}</h3>
      <span class="status" [ngClass]="order.status">
        {{order.status}}
      </span>
    </div>

    <!-- INFO -->
    <div class="info">
      <p><strong>Total:</strong> ₹ {{order.totalAmount}}</p>
      <p><strong>Payment:</strong> {{order.paymentMethod}}</p>
      <p><strong>Date:</strong> {{order.createdAt | date:'medium'}}</p>
    </div>

    <!-- 🔥 ITEMS -->
    <div class="items">

      <div *ngFor="let item of order.items" class="item">

        <img 
          [src]="getLocalImage(item.productName)" 
          class="item-img"
        />

        <div class="item-details">
          <h4>{{item.productName}}</h4>
          <p>₹ {{item.price}}</p>
          <p>Qty: {{item.quantity}}</p>
        </div>

      </div>

    </div>

    <!-- 🔥 ACTIONS (ADD HERE) -->
    <div class="actions">

      <button 
        *ngIf="order.status !== 'CANCELLED' && order.status !== 'DELIVERED'"
        (click)="cancelOrder(order.id)"
        class="cancel-btn">
        Cancel
      </button>

    </div>

    <!-- 🔥 TRACKING (ADD HERE) -->
    <div class="track">

      <div class="step" [class.active]="getTrackingStatus(order.status) >= 1">Placed</div>
      <div class="step" [class.active]="getTrackingStatus(order.status) >= 2">Shipped</div>
      <div class="step" [class.active]="getTrackingStatus(order.status) >= 3">Out</div>
      <div class="step" [class.active]="getTrackingStatus(order.status) >= 4">Delivered</div>

    </div>


  </div>

</div>
